<lib-base-dialog title="Sign out" (closed)="close()">
    <p class="message">Are you sure you want to sign out?</p>
    <div class="actions">
        <button class="btn" (click)="close()">Cancel</button>
        <button class="btn btn--danger" (click)="confirm()">Sign out</button>
    </div>
</lib-base-dialog>
